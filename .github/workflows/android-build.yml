name: Build Android App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build Web App
      run: npm run build

    - name: Add Android Platform
      run: |
        if [ ! -d "android" ]; then
          npx cap add android
        fi
        npx cap sync android

    - name: Update AndroidManifest.xml for Permissions
      run: |
        MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
        
        # Add Internet permission
        if ! grep -q "android.permission.INTERNET" "$MANIFEST_PATH"; then
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET" />' "$MANIFEST_PATH"
        fi
        
        # Add Camera permission
        if ! grep -q "android.permission.CAMERA" "$MANIFEST_PATH"; then
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.CAMERA" />' "$MANIFEST_PATH"
        fi
        
        # Add Location permissions (GPS)
        if ! grep -q "android.permission.ACCESS_FINE_LOCATION" "$MANIFEST_PATH"; then
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />' "$MANIFEST_PATH"
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />' "$MANIFEST_PATH"
        fi
        
        # Add Storage permissions (Files)
        if ! grep -q "android.permission.READ_EXTERNAL_STORAGE" "$MANIFEST_PATH"; then
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' "$MANIFEST_PATH"
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' "$MANIFEST_PATH"
        fi
        
        # Add Record Audio permission (Microphone)
        if ! grep -q "android.permission.RECORD_AUDIO" "$MANIFEST_PATH"; then
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.RECORD_AUDIO" />' "$MANIFEST_PATH"
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Build Android APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
